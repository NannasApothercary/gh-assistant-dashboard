<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewed Email Log - Nanna's Apothecary</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --success: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: linear-gradient(135deg, #1e3a5f, #2d1b69);
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; }
  .header a {
    color: var(--accent-light);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .header a:hover { text-decoration: underline; }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 16px;
  }
  .summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .log-item .from {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 2px;
  }
  .log-item .subject {
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .log-item .note {
    font-size: 0.82rem;
    color: var(--accent-light);
    font-style: italic;
    margin-top: 6px;
    padding: 6px 10px;
    background: rgba(59,130,246,0.08);
    border-radius: 6px;
  }
  .log-item .dates {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
    display: flex;
    gap: 16px;
  }
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .container { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>&#128233; Reviewed Email Log</h1>
  <a href="index.html">&larr; Back to Dashboard</a>
</div>

<div class="container">
  <div class="summary" id="summary"></div>
  <div id="logList">
    <div class="empty">No reviewed emails yet. Check off emails on the dashboard to see them here.</div>
  </div>
</div>

<script>
  // This page reads from the same data source as the dashboard.
  // For now, it renders any entries passed via URL hash or shows the placeholder.
  // When the daily briefing updates both pages, reviewed items will appear here.

  function renderLog() {
    // Try to read reviewed emails from the opener/parent dashboard
    let reviewed = [];
    try {
      if (window.opener && window.opener.reviewedEmails) {
        reviewed = window.opener.reviewedEmails;
      }
    } catch(e) {}

    const container = document.getElementById('logList');
    const summary = document.getElementById('summary');

    if (reviewed.length === 0) {
      summary.textContent = 'Reviewed emails will appear here after you check them off on the dashboard.';
      container.innerHTML = '<div class="empty">No reviewed emails yet. Check off emails on the dashboard and this log will populate.</div>';
      return;
    }

    summary.textContent = reviewed.length + ' email' + (reviewed.length === 1 ? '' : 's') + ' reviewed';

    container.innerHTML = reviewed.map(e => {
      const reviewDate = e.reviewedDate ? new Date(e.reviewedDate).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : '';
      const emailDate = e.emailDate ? new Date(e.emailDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
      const noteHtml = e.note ? `<div class="note">"${e.note}"</div>` : '';
      return `<div class="log-item">
        <div class="from">${e.from || 'Unknown'}</div>
        <div class="subject">${e.subject || ''}</div>
        ${noteHtml}
        <div class="dates">
          <span>Email: ${emailDate}</span>
          <span>Reviewed: ${reviewDate}</span>
        </div>
      </div>`;
    }).join('');
  }

  renderLog();
</script>

</body>
</html>
